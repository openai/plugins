interface:
  display_name: "Plugin Creator"
  short_description: "Scaffold plugins and marketplace entries"
  default_prompt: "Use $plugin-creator to scaffold a plugin with placeholder plugin.json, optional structure, and a marketplace.json entry. Default marketplace-backed creation to the user's personal marketplace. If the current Git repo already has `.agents/plugins/marketplace.json` and the user has not said personal or team, ask which marketplace to update. When the scaffold created or updated a marketplace-backed plugin, end the final response with Markdown deeplinks labeled `View <plugin-name>` and `Share <plugin-name>`."
